<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Luxury Car Racing Game</title>
  <style>
    body {
      margin: 0;
      background: #111;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    #gameArea {
      width: 400px;
      height: 600px;
      margin: 10px auto;
      background: #333;
      position: relative;
      overflow: hidden;
      border: 5px solid #fff;
    }

    .roadLine {
      width: 10px;
      height: 100px;
      background: white;
      position: absolute;
      left: 195px;
    }

    .car {
      width: 60px;
      height: 110px;
      position: absolute;
      bottom: 20px;
      left: 170px;
      background: linear-gradient(red, darkred);
      border-radius: 12px;
      color: white;
      text-align: center;
      line-height: 110px;
      font-size: 10px;
      font-weight: bold;
    }

    .enemy {
      width: 60px;
      height: 110px;
      position: absolute;
      border-radius: 12px;
      color: white;
      text-align: center;
      line-height: 110px;
      font-size: 10px;
      font-weight: bold;
    }

    #score {
      color: white;
      font-size: 20px;
    }

    #startBtn {
      margin: 10px;
      padding: 10px 20px;
      font-size: 18px;
      cursor: pointer;
    }

    #controls {
      margin-top: 10px;
    }

    .btn {
      padding: 15px;
      margin: 5px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .btn:active {
      background: #888;
    }
  </style>
</head>
<body>

<div id="score">Score: 0</div>
<button id="startBtn">Start Game</button>
<div id="gameArea"></div>

<div id="controls">
  <div>
    <button class="btn" id="up">⬆️</button>
  </div>
  <div>
    <button class="btn" id="left">⬅️</button>
    <button class="btn" id="down">⬇️</button>
    <button class="btn" id="right">➡️</button>
  </div>
</div>

<script>
  const gameArea = document.getElementById('gameArea');
  const scoreDisplay = document.getElementById('score');
  const startBtn = document.getElementById('startBtn');

  let player = { speed: 5, score: 0 };
  let keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };

  const enemyTypes = [
    { name: "TAXI", color: "yellow" },
    { name: "SUV", color: "green" },
    { name: "TRUCK", color: "blue" }
  ];

  startBtn.addEventListener('click', startGame);

  // Keyboard controls
  document.addEventListener('keydown', e => keys[e.key] = true);
  document.addEventListener('keyup', e => keys[e.key] = false);

  // Button controls (mobile/external)
  function bindButton(id, key) {
    const btn = document.getElementById(id);
    btn.addEventListener('mousedown', () => keys[key] = true);
    btn.addEventListener('mouseup', () => keys[key] = false);
    btn.addEventListener('touchstart', () => keys[key] = true);
    btn.addEventListener('touchend', () => keys[key] = false);
  }

  bindButton('up', 'ArrowUp');
  bindButton('down', 'ArrowDown');
  bindButton('left', 'ArrowLeft');
  bindButton('right', 'ArrowRight');

  function startGame() {
    gameArea.innerHTML = '';
    player.score = 0;
    player.start = true;

    for (let i = 0; i < 5; i++) {
      let line = document.createElement('div');
      line.classList.add('roadLine');
      line.y = i * 150;
      line.style.top = line.y + 'px';
      gameArea.appendChild(line);
    }

    let car = document.createElement('div');
    car.classList.add('car');
    car.innerText = "LAMBORGHINI";
    gameArea.appendChild(car);

    player.x = car.offsetLeft;
    player.y = car.offsetTop;

    for (let i = 0; i < 3; i++) {
      let enemy = document.createElement('div');
      enemy.classList.add('enemy');

      let type = enemyTypes[Math.floor(Math.random() * enemyTypes.length)];
      enemy.style.background = type.color;
      enemy.innerText = type.name;

      enemy.y = (i + 1) * -300;
      enemy.style.top = enemy.y + 'px';
      enemy.style.left = Math.floor(Math.random() * 340) + 'px';

      gameArea.appendChild(enemy);
    }

    window.requestAnimationFrame(playGame);
  }

  function moveLines() {
    document.querySelectorAll('.roadLine').forEach(line => {
      line.y += player.speed;
      if (line.y >= 600) line.y = -100;
      line.style.top = line.y + 'px';
    });
  }

  function moveEnemies(car) {
    document.querySelectorAll('.enemy').forEach(enemy => {
      if (isCollide(car, enemy)) {
        endGame();
      }

      enemy.y += player.speed;
      if (enemy.y >= 600) {
        enemy.y = -300;
        enemy.style.left = Math.floor(Math.random() * 340) + 'px';
        player.score++;
      }
      enemy.style.top = enemy.y + 'px';
    });
  }

  function isCollide(a, b) {
    let aRect = a.getBoundingClientRect();
    let bRect = b.getBoundingClientRect();

    return !(
      aRect.bottom < bRect.top ||
      aRect.top > bRect.bottom ||
      aRect.right < bRect.left ||
      aRect.left > bRect.right
    );
  }

  function playGame() {
    let car = document.querySelector('.car');

    if (player.start) {
      moveLines();
      moveEnemies(car);

      if (keys.ArrowLeft && player.x > 0) player.x -= player.speed;
      if (keys.ArrowRight && player.x < 340) player.x += player.speed;
      if (keys.ArrowUp && player.y > 0) player.y -= player.speed;
      if (keys.ArrowDown && player.y < 500) player.y += player.speed;

      car.style.left = player.x + 'px';
      car.style.top = player.y + 'px';

      player.score++;
      scoreDisplay.innerText = "Score: " + player.score;

      window.requestAnimationFrame(playGame);
    }
  }

  function endGame() {
    player.start = false;
    alert('Game Over! Your score: ' + player.score);
  }
</script>

</body>
</html>
